name: Preview Validation

on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Published HTTPS preview URL to smoke test"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: preview-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: External smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run external smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.preview_url }}
        run: npm run test:e2e:external

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-smoke-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
